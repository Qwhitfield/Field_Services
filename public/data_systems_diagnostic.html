<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Systems Reality Check -- QAMW Consulting</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #0a0a0a;
  --bg-card: #1a1a1a;
  --accent: #e8521a;
  --accent-lt: #f0683a;
  --accent-dim: rgba(232,82,26,0.25);
  --text-primary: #f0ece4;
  --text-muted: #7a7570;
  --border: #242424;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg-dark);
  color: var(--text-primary);
  font-family: 'Plus Jakarta Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  padding: 28px 40px 24px;
  border-bottom: 1px solid var(--border);
}
.brand {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.brand::before {
  content: '';
  display: block;
  width: 20px;
  height: 1px;
  background: var(--accent);
}
.header-title {
  font-size: clamp(1.4rem, 3vw, 1.9rem);
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1;
}
.header-title span { color: var(--accent); }
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 40px;
  max-width: 820px;
  width: 100%;
  margin: 0 auto;
}
.progress-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
}
.progress-bar {
  height: 2px;
  background: var(--border);
  margin-bottom: 40px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.5s ease;
}
.q-eyebrow {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.q-eyebrow::before {
  content: '';
  display: block;
  width: 20px;
  height: 1px;
  background: var(--accent);
}
.q-text {
  font-size: clamp(1.2rem, 2.5vw, 1.6rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.25;
  margin-bottom: 10px;
}
.q-sub {
  font-size: 0.85rem;
  font-weight: 300;
  color: var(--text-muted);
  line-height: 1.6;
  margin-bottom: 24px;
}
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 28px;
}
.opt-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 16px 20px;
  text-align: left;
  cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.88rem;
  font-weight: 400;
  line-height: 1.4;
  border-radius: 4px;
  transition: all 0.18s ease;
  position: relative;
}
.opt-btn:hover {
  border-color: var(--accent);
  background: rgba(232,82,26,0.07);
}
.opt-btn.selected {
  border-color: var(--accent);
  background: rgba(232,82,26,0.12);
}
.opt-btn.selected::after {
  content: 'v';
  position: absolute;
  top: 12px;
  right: 14px;
  font-size: 0.75rem;
  color: var(--accent);
  font-weight: 700;
}
.opt-label {
  font-weight: 600;
  display: block;
  margin-bottom: 3px;
}
.opt-desc {
  font-size: 0.78rem;
  color: var(--text-muted);
  font-weight: 300;
}
.multi-hint {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.text-input {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-primary);
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 0.9rem;
  padding: 16px 20px;
  width: 100%;
  resize: vertical;
  min-height: 100px;
  outline: none;
  transition: border-color 0.18s ease;
  margin-bottom: 28px;
}
.text-input:focus { border-color: var(--accent); }
.nav-row {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
}
.btn-next {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 14px 32px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 4px;
  transition: background 0.18s ease;
}
.btn-next:hover { background: var(--accent-lt); }
.btn-next:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-back {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border);
  padding: 14px 24px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 4px;
  transition: all 0.18s ease;
}
.btn-back:hover { border-color: var(--text-muted); color: var(--text-primary); }
.loading-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  min-height: 300px;
  text-align: center;
}
.spinner {
  width: 44px;
  height: 44px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.result-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 24px;
  margin-bottom: 16px;
}
.result-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.result-label::before {
  content: '';
  display: block;
  width: 16px;
  height: 1px;
  background: var(--accent);
}
.result-card h3 {
  font-size: 1.05rem;
  font-weight: 700;
  margin-bottom: 10px;
}
.result-card p {
  font-size: 0.86rem;
  font-weight: 300;
  color: #bfbab2;
  line-height: 1.7;
}
.priority-item {
  margin-bottom: 14px;
  padding-left: 16px;
  border-left: 2px solid var(--accent);
}
.priority-item strong {
  display: block;
  font-size: 0.9rem;
  margin-bottom: 4px;
}
.priority-item span {
  font-size: 0.82rem;
  color: var(--text-muted);
  font-weight: 300;
  line-height: 1.6;
}
.score-row {
  display: flex;
  gap: 12px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.pill {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 4px;
}
.pill-red { background: rgba(220,50,40,0.15); color: #e05a50; border: 1px solid rgba(220,50,40,0.3); }
.pill-orange { background: rgba(232,82,26,0.15); color: var(--accent); border: 1px solid var(--accent-dim); }
.pill-yellow { background: rgba(240,180,41,0.12); color: #d4a030; border: 1px solid rgba(240,180,41,0.3); }
.pill-green { background: rgba(45,158,107,0.12); color: #3aaa7a; border: 1px solid rgba(45,158,107,0.3); }
.pill-gray { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted); }
.cta-block {
  background: var(--accent);
  border-radius: 4px;
  padding: 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.cta-block h3 { font-size: 1.1rem; font-weight: 800; color: #fff; margin-bottom: 4px; }
.cta-block p { font-size: 0.82rem; color: rgba(255,255,255,0.75); font-weight: 300; }
.cta-link {
  background: var(--bg-dark);
  color: var(--text-primary);
  border: none;
  padding: 14px 28px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 4px;
  text-decoration: none;
  display: inline-block;
  white-space: nowrap;
}
.footer {
  padding: 18px 40px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
}
.footer-txt {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.footer-txt span { color: var(--accent); }
@media (max-width: 700px) {
  .header { padding: 20px 24px; }
  .main { padding: 24px; }
  .options-grid { grid-template-columns: 1fr; }
  .footer { padding: 18px 24px; flex-direction: column; gap: 6px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="brand">QAMW Consulting -- Systems Diagnostics</div>
  <div class="header-title">Data Systems <span>Reality Check</span></div>
</div>

<div class="main" id="app"></div>

<div class="footer">
  <div class="footer-txt">QAMW <span>Consulting</span> -- qamwconsulting.com</div>
  <div class="footer-txt" style="color:#333;">Site by QAMW Consulting</div>
</div>

<script>
var API_KEY = ANTHROPIC_API_KEY;

var questions = [
  {
    id: 'industry',
    eyebrow: 'About Your Business',
    text: 'What type of business are you running?',
    sub: 'Pick the one that fits closest.',
    type: 'single',
    options: [
      { label: 'Field Service / Trades', desc: 'HVAC, plumbing, electrical, roofing, landscaping' },
      { label: 'Construction / Contracting', desc: 'GC, sub-contractor, remodeling, project-based' },
      { label: 'Professional Services', desc: 'Consulting, legal, accounting, staffing, agencies' },
      { label: 'Nonprofit / Education', desc: 'Programs, grants, community services, schools' },
      { label: 'Healthcare / Clinics', desc: 'Medical practice, dental, therapy, wellness' },
      { label: 'Retail / E-commerce', desc: 'Products, inventory, fulfillment, storefronts' },
      { label: 'Other Service Business', desc: 'Does not fit the above but you serve clients' }
    ]
  },
  {
    id: 'size',
    eyebrow: 'Team and Scale',
    text: 'How big is your operation right now?',
    sub: 'Staff count gives context for how complex your systems need to be.',
    type: 'single',
    options: [
      { label: 'Just me (solo)', desc: 'Owner-operated, maybe 1-2 contractors' },
      { label: '2 to 10 people', desc: 'Small core team, everyone wears multiple hats' },
      { label: '11 to 30 people', desc: 'Growing team, starting to feel the growing pains' },
      { label: '31 to 75 people', desc: 'Established team, complexity is real' },
      { label: '75 plus people', desc: 'Larger org, departments starting to form' }
    ]
  },
  {
    id: 'tools',
    eyebrow: 'Your Current Stack',
    text: 'Which tools are you actively using to run your business?',
    sub: 'Select everything that applies, even if it is barely being used.',
    type: 'multi',
    options: [
      { label: 'Excel or Google Sheets', desc: 'For tracking, reporting, or operations' },
      { label: 'A CRM', desc: 'HubSpot, Salesforce, GoHighLevel, etc.' },
      { label: 'Accounting Software', desc: 'QuickBooks, Xero, FreshBooks' },
      { label: 'Field or Project Mgmt Tool', desc: 'ServiceTitan, Buildertrend, Jobber, Procore' },
      { label: 'Scheduling Tool', desc: 'Separate from your main system' },
      { label: 'BI or Reporting Tool', desc: 'Power BI, Tableau, Looker, etc.' },
      { label: 'Marketing Platform', desc: 'Email, SMS, social scheduling' },
      { label: 'Manual Processes Only', desc: 'Mostly paper, email chains, or verbal' }
    ]
  },
  {
    id: 'data_location',
    eyebrow: 'Where Your Data Lives',
    text: 'When you need a number to make a business decision, where do you go get it?',
    sub: 'Be honest. This is one of the most telling questions.',
    type: 'single',
    options: [
      { label: 'One main system', desc: 'It is all in one place and I trust it' },
      { label: 'A few different tools', desc: 'I have to check 2-3 places and piece it together' },
      { label: 'Spreadsheets I built', desc: 'I pull it into sheets and calculate manually' },
      { label: 'I ask someone on my team', desc: 'They are the keeper of that information' },
      { label: 'Honestly not sure', desc: 'Different people have different versions' },
      { label: 'We do not really track it', desc: 'That data is not captured consistently' }
    ]
  },
  {
    id: 'manual_work',
    eyebrow: 'Manual Work and Time Lost',
    text: 'Which of these is your team currently doing manually?',
    sub: 'Select everything that applies.',
    type: 'multi',
    options: [
      { label: 'Copying data between systems', desc: 'Re-entering the same info in multiple places' },
      { label: 'Building weekly or monthly reports', desc: 'Someone spends hours pulling this together' },
      { label: 'Chasing down job status', desc: 'Calling or texting to find out what is happening' },
      { label: 'Reconciling invoices and payments', desc: 'Cross-checking billing against actuals' },
      { label: 'Following up with leads or clients', desc: 'No automation, someone does it manually' },
      { label: 'Tracking project costs or time', desc: 'Usually in a spreadsheet or not at all' }
    ]
  },
  {
    id: 'biggest_pain',
    eyebrow: 'Your Main Frustration',
    text: 'If you could fix ONE thing about how your business runs, what would it be?',
    sub: 'Do not overthink it. First answer is usually the real one.',
    type: 'text',
    placeholder: 'e.g. I never know if we are actually profitable until month-end'
  },
  {
    id: 'ai_attempts',
    eyebrow: 'AI and Automation',
    text: 'Have you tried to add AI or automation to your business yet?',
    sub: 'No wrong answer here.',
    type: 'single',
    options: [
      { label: 'Yes and it is working', desc: 'We have automations running that we trust' },
      { label: 'Yes but it did not stick', desc: 'We tried something and it did not deliver' },
      { label: 'In progress', desc: 'We are actively trying to set something up' },
      { label: 'Thinking about it', desc: 'Not yet but it is on the roadmap' },
      { label: 'Not at all yet', desc: 'Still running everything manually' }
    ]
  }
];

var answers = {};
var currentQ = 0;

function app() { return document.getElementById('app'); }

function renderQuestion() {
  var q = questions[currentQ];
  var saved = answers[q.id];
  var total = questions.length;
  var pct = Math.round((currentQ / total) * 100);
  var html = '';

  html += '<div class="progress-label"><span>Question ' + (currentQ + 1) + ' of ' + total + '</span><span>' + pct + '% complete</span></div>';
  html += '<div class="progress-bar"><div class="progress-fill" id="pbar" style="width:' + pct + '%"></div></div>';
  html += '<div class="q-eyebrow">' + q.eyebrow + '</div>';
  html += '<div class="q-text">' + q.text + '</div>';
  if (q.sub) { html += '<div class="q-sub">' + q.sub + '</div>'; }

  if (q.type === 'single' || q.type === 'multi') {
    if (q.type === 'multi') {
      html += '<div class="multi-hint">Select all that apply</div>';
    }
    html += '<div class="options-grid">';
    for (var i = 0; i < q.options.length; i++) {
      var o = q.options[i];
      var isSelected = false;
      if (q.type === 'single') {
        isSelected = saved === o.label;
      } else {
        isSelected = saved && saved.indexOf(o.label) >= 0;
      }
      var selClass = isSelected ? ' selected' : '';
      html += '<button class="opt-btn' + selClass + '" onclick="handleOption(\'' + q.id + '\',\'' + q.type + '\',' + i + ')">';
      html += '<span class="opt-label">' + o.label + '</span>';
      html += '<span class="opt-desc">' + o.desc + '</span>';
      html += '</button>';
    }
    html += '</div>';
  } else if (q.type === 'text') {
    var savedVal = saved || '';
    html += '<textarea class="text-input" id="txt" placeholder="' + q.placeholder + '">' + savedVal + '</textarea>';
  }

  html += '<div class="nav-row">';
  if (currentQ > 0) {
    html += '<button class="btn-back" onclick="goBack()">Back</button>';
  }
  var canGo = canProceed();
  var btnLabel = currentQ < questions.length - 1 ? 'Continue' : 'See My Results';
  html += '<button class="btn-next" id="btnnext" onclick="goNext()" ' + (canGo ? '' : 'disabled') + '>' + btnLabel + '</button>';
  html += '</div>';

  app().innerHTML = html;
}

function handleOption(qid, type, idx) {
  var q = questions[currentQ];
  var o = q.options[idx];
  if (type === 'single') {
    answers[qid] = o.label;
    var btns = document.querySelectorAll('.opt-btn');
    for (var i = 0; i < btns.length; i++) { btns[i].classList.remove('selected'); }
    btns[idx].classList.add('selected');
  } else {
    if (!answers[qid]) { answers[qid] = []; }
    var pos = answers[qid].indexOf(o.label);
    var btn = document.querySelectorAll('.opt-btn')[idx];
    if (pos >= 0) {
      answers[qid].splice(pos, 1);
      btn.classList.remove('selected');
    } else {
      answers[qid].push(o.label);
      btn.classList.add('selected');
    }
  }
  var next = document.getElementById('btnnext');
  if (next) { next.disabled = !canProceed(); }
}

function canProceed() {
  var q = questions[currentQ];
  var s = answers[q.id];
  if (q.type === 'single') { return !!s; }
  if (q.type === 'multi') { return s && s.length > 0; }
  return true;
}

function goNext() {
  var q = questions[currentQ];
  if (q.type === 'text') {
    var el = document.getElementById('txt');
    if (el) { answers[q.id] = el.value; }
  }
  if (currentQ < questions.length - 1) {
    currentQ++;
    renderQuestion();
  } else {
    showLoading();
    setTimeout(runDiagnostic, 500);
  }
}

function goBack() {
  currentQ--;
  renderQuestion();
}

function showLoading() {
  app().innerHTML = '<div class="loading-panel"><div class="spinner"></div><div class="loading-text">Diagnosing your systems...</div></div>';
}

function buildPrompt() {
  var tools = Array.isArray(answers.tools) ? answers.tools.join(', ') : 'None';
  var manual = Array.isArray(answers.manual_work) ? answers.manual_work.join(', ') : 'None';
  return 'Business owner diagnostic answers:\n\nIndustry: ' + (answers.industry || 'Not specified') + '\nTeam size: ' + (answers.size || 'Not specified') + '\nTools in use: ' + tools + '\nWhere data lives: ' + (answers.data_location || 'Not specified') + '\nManual work happening: ' + manual + '\nBiggest pain in their words: ' + (answers.biggest_pain || 'Not provided') + '\nAI/automation status: ' + (answers.ai_attempts || 'Not specified') + '\n\nDiagnose their systems health and give them a prioritized starting point.';
}

function runDiagnostic() {
  if (API_KEY === 'YOUR_API_KEY_HERE') {
    renderResults(getFallback(), true);
    return;
  }

  var prompt = buildPrompt();

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: 'You are a systems diagnostics consultant for QAMW Consulting. Review answers and produce a clear honest practical diagnosis. Write like a peer. Direct, short sentences, no jargon, no fluff. Return ONLY valid JSON with these exact keys: readiness_score (1-10 number as string), readiness_label (one of: Critical, Needs Work, Getting There, Strong Foundation), top_gap (one sentence), gap_explanation (2-3 sentences referencing their answers), priority_1 (object with title and detail), priority_2 (object with title and detail), priority_3 (object with title and detail), ai_readiness (one blunt sentence), honest_take (2-3 sentences of straight talk). No markdown, no backticks, just raw JSON.',
      messages: [{ role: 'user', content: prompt }]
    })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    var text = '';
    for (var i = 0; i < data.content.length; i++) {
      if (data.content[i].type === 'text') { text += data.content[i].text; }
    }
    var result;
    try {
      result = JSON.parse(text.trim());
    } catch(e) {
      result = getFallback();
    }
    renderResults(result, false);
  })
  .catch(function() {
    renderResults(getFallback(), true);
  });
}

function getFallback() {
  return {
    readiness_score: '4',
    readiness_label: 'Needs Work',
    top_gap: 'Your data is scattered across tools that do not talk to each other.',
    gap_explanation: 'When the same information lives in multiple places, you end up with different versions of the truth. That makes it hard to trust any number you pull -- which means decisions get delayed or made on gut feel.',
    priority_1: { title: 'Identify Your Source of Truth', detail: 'Pick one system that should own each type of data. Everything else should feed that system, not compete with it.' },
    priority_2: { title: 'Eliminate One Manual Process', detail: 'Find the task that takes the most time and has the clearest trigger. That is your first automation candidate.' },
    priority_3: { title: 'Build One Report You Actually Trust', detail: 'Clean the data for just the fields that drive your main decisions. Do not try to build everything at once.' },
    ai_readiness: 'You are not ready for AI yet -- adding it now would just automate the confusion.',
    honest_take: 'The tools are not the problem. There is no clear owner for your data and no agreed-upon place where the truth lives. Fix that first and everything else gets easier.'
  };
}

function getPillClass(label) {
  if (label === 'Critical') { return 'pill pill-red'; }
  if (label === 'Needs Work') { return 'pill pill-orange'; }
  if (label === 'Getting There') { return 'pill pill-yellow'; }
  if (label === 'Strong Foundation') { return 'pill pill-green'; }
  return 'pill pill-orange';
}

function renderResults(r, isFallback) {
  var html = '';

  if (isFallback) {
    html += '<div style="background:rgba(240,180,41,0.08);border:1px solid rgba(240,180,41,0.2);border-radius:4px;padding:12px 16px;font-size:0.78rem;color:#d4a030;margin-bottom:16px;">Demo mode -- add your API key for a personalized result.</div>';
  }

  html += '<div class="q-eyebrow">Your Diagnosis</div>';
  html += '<div class="q-text" style="margin-bottom:10px;">Here is what is actually going on with your data systems.</div>';
  html += '<div class="score-row" style="margin-bottom:28px;">';
  html += '<span class="' + getPillClass(r.readiness_label) + '">' + r.readiness_label + '</span>';
  html += '<span class="pill pill-gray">Readiness Score: ' + r.readiness_score + '/10</span>';
  html += '</div>';

  html += '<div class="result-card">';
  html += '<div class="result-label">Biggest Gap</div>';
  html += '<h3>' + r.top_gap + '</h3>';
  html += '<p>' + r.gap_explanation + '</p>';
  html += '</div>';

  html += '<div class="result-card">';
  html += '<div class="result-label">Where to Start -- In Order</div>';
  html += '<div class="priority-item"><strong>' + r.priority_1.title + '</strong><span>' + r.priority_1.detail + '</span></div>';
  html += '<div class="priority-item"><strong>' + r.priority_2.title + '</strong><span>' + r.priority_2.detail + '</span></div>';
  html += '<div class="priority-item" style="margin-bottom:0"><strong>' + r.priority_3.title + '</strong><span>' + r.priority_3.detail + '</span></div>';
  html += '</div>';

  html += '<div class="result-card">';
  html += '<div class="result-label">AI Readiness</div>';
  html += '<p>' + r.ai_readiness + '</p>';
  html += '</div>';

  html += '<div class="result-card" style="border-color:var(--accent-dim)">';
  html += '<div class="result-label">Straight Talk</div>';
  html += '<p>' + r.honest_take + '</p>';
  html += '</div>';

  html += '<div class="cta-block">';
  html += '<div><h3>Want to know exactly what to fix first?</h3><p>A 20-minute call is enough to map your situation and give you a real starting point.</p></div>';
  html += '<a href="https://calendly.com/quinita17/linkedin-book-a-call" target="_blank" class="cta-link">Book a Call</a>';
  html += '</div>';

  html += '<div style="text-align:center;padding-bottom:20px;">';
  html += '<button class="btn-back" onclick="restart()">Start Over</button>';
  html += '</div>';

  app().innerHTML = html;
}

function restart() {
  answers = {};
  currentQ = 0;
  renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
